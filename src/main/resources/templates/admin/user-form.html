<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/index}">
<head>
  <title th:text="${editMode} ? 'Sửa tài khoản' : 'Thêm tài khoản'">Tài khoản</title>
</head>
<body>
<main layout:fragment="content">
  <section class="min-h-screen pt-32 pb-20 px-4 sm:px-6 lg:px-8 animated-bg">
    <div class="relative z-10 max-w-xl mx-auto">
      <a th:href="@{/admin/users}" class="inline-flex items-center gap-2 text-gray-400 hover:text-white mb-6">
        <i class="fas fa-arrow-left"></i> Danh sách tài khoản
      </a>

      <div th:if="${errorMessage}" class="mb-4 p-4 rounded-xl bg-red-500/15 border border-red-500/40 text-red-200 text-sm" th:text="${errorMessage}"></div>

      <h1 class="text-2xl font-bold text-white mb-6" th:text="${editMode} ? 'Sửa tài khoản' : 'Thêm tài khoản mới'"></h1>

      <form method="post" th:object="${userForm}"
            th:action="${editMode} ? @{/admin/users/edit/{id}(id=${userId})} : @{/admin/users/create}"
            class="rounded-3xl bg-cinema-card border border-white/5 p-8 space-y-5">
        <div>
          <label class="block text-sm text-gray-400 mb-1">Tên đăng nhập</label>
          <input th:field="*{username}" required class="w-full bg-cinema-dark border border-white/10 rounded-xl px-4 py-3 text-white"/>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1"
                 th:text="${editMode} ? 'Mật khẩu mới (để trống nếu giữ nguyên)' : 'Mật khẩu'"></label>
          <input type="password" th:field="*{password}" th:required="${!editMode}"
                 class="w-full bg-cinema-dark border border-white/10 rounded-xl px-4 py-3 text-white"/>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Vai trò</label>
          <select th:field="*{role}" class="w-full bg-cinema-dark border border-white/10 rounded-xl px-4 py-3 text-white">
            <option th:each="r : ${roles}" th:value="${r}" th:text="${r.name()}"></option>
          </select>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Họ tên</label>
          <input th:field="*{fullName}" required class="w-full bg-cinema-dark border border-white/10 rounded-xl px-4 py-3 text-white"/>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Email</label>
          <input type="email" th:field="*{email}" required class="w-full bg-cinema-dark border border-white/10 rounded-xl px-4 py-3 text-white"/>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Điện thoại</label>
          <input th:field="*{phone}" class="w-full bg-cinema-dark border border-white/10 rounded-xl px-4 py-3 text-white"/>
        </div>
        <div class="flex gap-3 pt-4">
          <button type="submit" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-brand-500 to-purple-600 text-white font-bold">Lưu</button>
          <a th:href="@{/admin/users}" class="flex-1 py-3 rounded-xl border border-white/10 text-gray-300 text-center">Hủy</a>
        </div>
      </form>
    </div>
  </section>
</main>
</body>
</html>
