<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/index}">
<head>
  <title th:text="${movieId != null ? 'Chỉnh Sửa Phim' : 'Thêm Phim Mới'}"></title>
</head>
<body>
<main layout:fragment="content">
  <section class="min-h-screen pt-32 pb-20 px-4 sm:px-6 lg:px-8 animated-bg">
    <div class="relative z-10 max-w-3xl mx-auto">
      <div class="mb-10 flex items-center gap-4">
        <a th:href="@{/admin/movies}" class="w-10 h-10 rounded-lg bg-white/10 hover:bg-white/20 flex items-center justify-center text-gray-300">
          <i class="fas fa-arrow-left"></i>
        </a>
        <div>
          <h1 class="text-4xl font-display font-bold text-white" th:text="${movieId != null ? 'Chỉnh Sửa Phim' : 'Thêm Phim Mới'}"></h1>
          <p class="text-gray-400 text-sm mt-1" th:text="${movieId != null ? 'Cập nhật thông tin phim' : 'Nhập thông tin phim mới'}"></p>
        </div>
      </div>

      <div th:if="${errorMessage}" class="mb-4 p-4 rounded-lg bg-red-600/20 border border-red-500/30 text-red-300" th:text="${errorMessage}"></div>
      <div th:if="${validationError}" class="mb-4 p-4 rounded-lg bg-amber-600/20 border border-amber-500/30 text-amber-200 text-sm" th:text="${validationError}"></div>

      <div class="rounded-3xl bg-cinema-card border border-white/5 shadow-card p-8">
        <form method="post" th:object="${movieDto}" th:action="@{|/admin/movies/${movieId != null ? 'edit/' + movieId : 'create'}|}" class="space-y-6" novalidate>
          <div>
            <label class="block text-sm font-semibold text-gray-200 mb-2">Tên phim *</label>
            <input type="text" th:field="*{title}" class="w-full px-4 py-3 rounded-lg bg-cinema-surface border border-white/10 text-white" />
            <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-red-400 text-xs mt-1"></p>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-200 mb-2">Mô tả *</label>
            <textarea th:field="*{description}" rows="4" class="w-full px-4 py-3 rounded-lg bg-cinema-surface border border-white/10 text-white"></textarea>
            <p th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="text-red-400 text-xs mt-1"></p>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-semibold text-gray-200 mb-2">Thời lượng (phút) *</label>
              <input type="number" th:field="*{durationMinutes}" min="1" class="w-full px-4 py-3 rounded-lg bg-cinema-surface border border-white/10 text-white" />
              <p th:if="${#fields.hasErrors('durationMinutes')}" th:errors="*{durationMinutes}" class="text-red-400 text-xs mt-1"></p>
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-200 mb-2">Ngày phát hành *</label>
              <input type="date" name="releaseDate" required
                     th:value="${movieDto.releaseDate != null ? #temporals.format(movieDto.releaseDate, 'yyyy-MM-dd') : ''}"
                     class="w-full px-4 py-3 rounded-lg bg-cinema-surface border border-white/10 text-white [color-scheme:dark]" />
              <p th:if="${#fields.hasErrors('releaseDate')}" th:errors="*{releaseDate}" class="text-red-400 text-xs mt-1"></p>
            </div>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-200 mb-2">Thể loại *</label>
            <select th:field="*{genreId}" class="w-full px-4 py-3 rounded-lg bg-cinema-surface border border-white/10 text-white">
              <option value="">-- Chọn thể loại --</option>
              <option th:each="g : ${genres}" th:value="${g.id}" th:text="${g.name}"></option>
            </select>
            <p th:if="${#fields.hasErrors('genreId')}" th:errors="*{genreId}" class="text-red-400 text-xs mt-1"></p>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-200 mb-2">URL poster *</label>
            <input type="url" th:field="*{posterUrl}" placeholder="https://.../poster.jpg"
                   class="w-full px-4 py-3 rounded-lg bg-cinema-surface border border-white/10 text-white" />
            <p class="text-gray-500 text-xs mt-1">Dán <strong>đường dẫn ảnh trực tiếp</strong> (kết thúc .jpg/.png hoặc TMDB). Không dùng link trang web.</p>
            <p th:if="${#fields.hasErrors('posterUrl')}" th:errors="*{posterUrl}" class="text-red-400 text-xs mt-1"></p>
            <img th:if="${movieDto.posterUrl != null and !#strings.isEmpty(movieDto.posterUrl)}"
                 th:src="${movieDto.posterUrl}" referrerpolicy="no-referrer"
                 alt="Xem trước poster" class="mt-3 max-h-48 rounded-lg border border-white/10 object-contain bg-black/40"
                 onerror="this.style.display='none'"/>
          </div>
          <div class="flex gap-3 pt-4">
            <button type="submit" class="flex-1 px-6 py-3 rounded-lg bg-gradient-to-r from-brand-500 to-purple-600 text-white font-semibold">
              <span th:text="${movieId != null ? 'Cập nhật' : 'Thêm phim'}"></span>
            </button>
            <a th:href="@{/admin/movies}" class="flex-1 px-6 py-3 rounded-lg border border-white/10 text-gray-300 text-center">Hủy</a>
          </div>
        </form>
      </div>
    </div>
  </section>
</main>
</body>
</html>
