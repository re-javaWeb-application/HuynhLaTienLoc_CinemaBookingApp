<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="navigation" id="main-nav" class="fixed top-0 left-0 right-0 z-50 transition-all duration-500">
    <!-- Navbar Background (dynamic on scroll) -->
    <div class="absolute inset-0 bg-cinema-dark/0 backdrop-blur-0 transition-all duration-500" id="nav-bg"></div>

    <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-20">
            <!-- Logo -->
            <div class="flex-shrink-0 flex items-center">
                <a th:href="@{/}" class="flex items-center gap-3 group">
                    <div class="relative">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-purple-600 flex items-center justify-center shadow-neon group-hover:shadow-neon-lg transition-all duration-300 group-hover:scale-110">
                            <i class="fas fa-play text-white text-sm ml-0.5"></i>
                        </div>
                        <div class="absolute -inset-1 rounded-xl bg-gradient-to-br from-brand-500 to-purple-600 opacity-0 group-hover:opacity-30 blur-md transition-all duration-300"></div>
                    </div>
                    <span class="text-2xl font-display font-bold tracking-tight text-white group-hover:text-brand-400 transition-colors duration-300">
                        CINE<span class="text-brand-500">MAX</span>
                    </span>
                </a>
            </div>

            <!-- Desktop Nav Links -->
            <nav class="hidden lg:flex items-center space-x-1">
                <a th:href="@{/home#phim-sap-chieu}" class="relative text-gray-300 hover:text-white px-4 py-2 text-sm font-medium transition-all duration-300 rounded-lg hover:bg-white/5 neon-underline">
                    <i class="fas fa-fire text-brand-400 mr-1.5 text-xs"></i> Phim Sắp Chiếu
                </a>
                <a th:href="@{/home#phim-sap-chieu}" class="relative text-gray-300 hover:text-white px-4 py-2 text-sm font-medium transition-all duration-300 rounded-lg hover:bg-white/5 neon-underline">
                    <i class="fas fa-calendar text-purple-400 mr-1.5 text-xs"></i> Lịch Chiếu
                </a>
                <a href="#" class="relative text-gray-300 hover:text-white px-4 py-2 text-sm font-medium transition-all duration-300 rounded-lg hover:bg-white/5 neon-underline">
                    <i class="fas fa-tags text-amber-400 mr-1.5 text-xs"></i> Khuyến Mãi
                </a>
                <a href="#" class="relative text-gray-300 hover:text-white px-4 py-2 text-sm font-medium transition-all duration-300 rounded-lg hover:bg-white/5 neon-underline">
                    <i class="fas fa-newspaper text-cyan-400 mr-1.5 text-xs"></i> Tin Tức
                </a>
            </nav>

            <!-- Auth Buttons + Mobile Toggle -->
            <div class="flex items-center space-x-3">
                <!-- Chưa đăng nhập -->
                <div th:if="${session.loggedInUser == null}" class="hidden md:flex items-center space-x-3">
                    <button id="btn-login" class="text-gray-300 hover:text-white text-sm font-medium transition-all duration-300 py-2.5 px-5 rounded-xl hover:bg-white/5 border border-transparent hover:border-white/10">
                        Đăng nhập
                    </button>
                    <button id="btn-register" class="relative bg-gradient-to-r from-brand-600 to-purple-600 hover:from-brand-500 hover:to-purple-500 text-white px-6 py-2.5 rounded-xl text-sm font-bold transition-all duration-300 shadow-neon hover:shadow-neon-lg hover:-translate-y-0.5 transform overflow-hidden group">
                        <span class="relative z-10">Đăng ký</span>
                        <div class="absolute inset-0 bg-gradient-to-r from-brand-400 to-purple-400 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    </button>
                </div>

                <!-- Đã đăng nhập -->
                <div th:if="${session.loggedInUser != null}" class="hidden md:flex items-center space-x-3">
                    <a th:if="${session.loggedInUser.role.name() == 'ADMIN'}"
                       th:href="@{/admin/movies}"
                       class="text-amber-400 hover:text-amber-300 text-sm font-semibold py-2.5 px-4 rounded-xl hover:bg-amber-500/10 border border-amber-500/20 transition-all duration-300">
                        <i class="fas fa-film mr-1.5"></i> Quản lý phim
                    </a>
                    <a th:if="${session.loggedInUser.role.name() == 'ADMIN'}"
                       th:href="@{/admin/showtimes}"
                       class="text-purple-400 hover:text-purple-300 text-sm font-semibold py-2.5 px-4 rounded-xl hover:bg-purple-500/10 border border-purple-500/20 transition-all duration-300">
                        <i class="fas fa-calendar-plus mr-1.5"></i> Lịch chiếu
                    </a>
                    <div class="flex items-center gap-3 py-2 px-4 rounded-xl bg-white/5 border border-white/5">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-brand-500 to-purple-600 flex items-center justify-center text-white text-xs font-bold">
                            <span th:text="${#strings.substring(session.loggedInUser.username, 0, 1).toUpperCase()}">U</span>
                        </div>
                        <span class="text-sm font-medium text-gray-300">
                            <span th:text="${session.loggedInUser.username}" class="text-white font-semibold"></span>
                        </span>
                    </div>
                    <a href="/profile" class="text-gray-400 hover:text-white p-2.5 rounded-xl hover:bg-white/5 transition-all duration-300" title="Hồ sơ">
                        <i class="fas fa-user-circle text-lg"></i>
                    </a>
                    <a th:href="@{/logout}" class="text-red-400 hover:text-red-300 p-2.5 rounded-xl hover:bg-red-500/10 border border-red-500/20 hover:border-red-500/40 transition-all duration-300" title="Đăng xuất">
                        <i class="fas fa-right-from-bracket text-sm"></i>
                    </a>
                </div>

                <!-- Mobile Hamburger -->
                <button id="mobile-menu-btn" class="lg:hidden text-gray-300 hover:text-white p-2 rounded-xl hover:bg-white/5 transition-all">
                    <i class="fas fa-bars text-xl" id="menu-icon"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="lg:hidden hidden">
        <div class="absolute top-full left-0 right-0 glass border-t border-white/5 shadow-2xl animate-slide-down">
            <div class="max-w-7xl mx-auto px-4 py-6 space-y-2">
                <a th:href="@{/home#phim-sap-chieu}" class="flex items-center gap-3 text-gray-300 hover:text-white py-3 px-4 rounded-xl hover:bg-white/5 transition-all text-sm font-medium">
                    <i class="fas fa-fire text-brand-400 w-5 text-center"></i> Phim Sắp Chiếu
                </a>
                <a th:href="@{/home#phim-sap-chieu}" class="flex items-center gap-3 text-gray-300 hover:text-white py-3 px-4 rounded-xl hover:bg-white/5 transition-all text-sm font-medium">
                    <i class="fas fa-calendar text-purple-400 w-5 text-center"></i> Lịch Chiếu
                </a>
                <a href="#" class="flex items-center gap-3 text-gray-300 hover:text-white py-3 px-4 rounded-xl hover:bg-white/5 transition-all text-sm font-medium">
                    <i class="fas fa-tags text-amber-400 w-5 text-center"></i> Khuyến Mãi
                </a>
                <a href="#" class="flex items-center gap-3 text-gray-300 hover:text-white py-3 px-4 rounded-xl hover:bg-white/5 transition-all text-sm font-medium">
                    <i class="fas fa-newspaper text-cyan-400 w-5 text-center"></i> Tin Tức
                </a>
                <div class="border-t border-white/5 pt-4 mt-4">
                    <div th:if="${session.loggedInUser == null}" class="space-y-2">
                        <button id="btn-login-mobile" class="w-full text-gray-300 hover:text-white text-sm font-medium py-3 px-4 rounded-xl hover:bg-white/5 border border-white/10 transition-all text-center">
                            Đăng nhập
                        </button>
                        <button id="btn-register-mobile" class="w-full bg-gradient-to-r from-brand-600 to-purple-600 text-white px-4 py-3 rounded-xl text-sm font-bold transition-all text-center">
                            Đăng ký miễn phí
                        </button>
                    </div>
                    <div th:if="${session.loggedInUser != null}" class="space-y-2">
                        <a href="/profile" class="flex items-center gap-3 text-gray-300 hover:text-white py-3 px-4 rounded-xl hover:bg-white/5 transition-all text-sm font-medium">
                            <i class="fas fa-user-circle w-5 text-center"></i> Hồ sơ
                        </a>
                        <a th:href="@{/logout}" class="flex items-center gap-3 text-red-400 hover:text-red-300 py-3 px-4 rounded-xl hover:bg-red-500/10 transition-all text-sm font-medium">
                            <i class="fas fa-right-from-bracket w-5 text-center"></i> Đăng xuất
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>

<!-- Nav scroll effect script -->
<script th:fragment="nav-script">
    document.addEventListener('DOMContentLoaded', () => {
        const nav = document.getElementById('main-nav');
        const navBg = document.getElementById('nav-bg');
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');

        // Scroll effect - add glass background
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navBg.classList.remove('bg-cinema-dark/0', 'backdrop-blur-0');
                navBg.classList.add('bg-cinema-dark/80', 'backdrop-blur-xl');
                nav.classList.add('border-b', 'border-white/5', 'shadow-xl');
            } else {
                navBg.classList.add('bg-cinema-dark/0', 'backdrop-blur-0');
                navBg.classList.remove('bg-cinema-dark/80', 'backdrop-blur-xl');
                nav.classList.remove('border-b', 'border-white/5', 'shadow-xl');
            }
        });

        // Mobile menu toggle
        if (mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
                if (mobileMenu.classList.contains('hidden')) {
                    menuIcon.classList.remove('fa-times');
                    menuIcon.classList.add('fa-bars');
                } else {
                    menuIcon.classList.remove('fa-bars');
                    menuIcon.classList.add('fa-times');
                }
            });
        }

        // Mobile buttons for login/register
        const loginMobile = document.getElementById('btn-login-mobile');
        const registerMobile = document.getElementById('btn-register-mobile');
        if (loginMobile) {
            loginMobile.addEventListener('click', () => {
                document.getElementById('btn-login')?.click();
                mobileMenu.classList.add('hidden');
                menuIcon.classList.remove('fa-times');
                menuIcon.classList.add('fa-bars');
            });
        }
        if (registerMobile) {
            registerMobile.addEventListener('click', () => {
                document.getElementById('btn-register')?.click();
                mobileMenu.classList.add('hidden');
                menuIcon.classList.remove('fa-times');
                menuIcon.classList.add('fa-bars');
            });
        }
    });
</script>
</body>
</html>
