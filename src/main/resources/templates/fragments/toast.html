<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>

<!--
    ═══════════════════════════════════════════════════════════════
    TOAST NOTIFICATION FRAGMENT
    Sử dụng: <div th:replace="~{fragments/toast :: toast}"></div>

    Đọc flash attribute từ Model:
      - toastType    : "success" | "error"
      - toastMessage : nội dung hiển thị
    ═══════════════════════════════════════════════════════════════
-->
<div th:fragment="toast">
    <!--
        data-type và data-message được Thymeleaf inject.
        JavaScript sẽ đọc chúng để hiển thị toast.
    -->
    <div id="toast-notification"
         th:data-type="${toastType}"
         th:data-message="${toastMessage}"
         class="fixed bottom-6 right-6 z-[9999] flex items-start gap-4
                min-w-[300px] max-w-[420px]
                rounded-2xl border backdrop-blur-xl
                px-5 py-4 shadow-2xl
                transition-all duration-400 ease-out
                translate-y-full opacity-0 pointer-events-none hidden"
         role="alert"
         aria-live="polite">

        <!-- Icon -->
        <div id="toast-icon" class="flex-shrink-0 mt-0.5">
            <!-- Filled by JavaScript -->
        </div>

        <!-- Message -->
        <div class="flex-1 min-w-0">
            <p id="toast-type-label" class="text-xs font-semibold text-gray-400 mb-0.5 uppercase tracking-wider"
               th:text="${toastType == 'success'} ? 'Thành công' : 'Lỗi'">Thông báo</p>
            <p id="toast-message" class="text-sm font-medium leading-snug text-gray-100">
                <!-- Filled by JavaScript -->
            </p>
        </div>

        <!-- Close button -->
        <button id="toast-close"
                class="flex-shrink-0 text-gray-600 hover:text-gray-300 transition-colors ml-1 mt-0.5"
                aria-label="Đóng thông báo">
            <i class="fas fa-times text-xs"></i>
        </button>
    </div>
</div>

</body>
</html>
