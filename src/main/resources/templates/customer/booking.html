<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/index}">
<head>
  <title>Đặt vé</title>
</head>
<body>
<main layout:fragment="content">
  <section class="min-h-screen pt-32 pb-20 px-4 sm:px-6 lg:px-8 animated-bg">
    <div class="relative z-10 max-w-2xl mx-auto">
      <a th:href="@{/home#phim-sap-chieu}" class="inline-flex items-center gap-2 text-gray-400 hover:text-white mb-8">
        <i class="fas fa-arrow-left"></i> Quay lại phim sắp chiếu
      </a>

      <div class="rounded-3xl bg-cinema-card border border-white/5 shadow-card overflow-hidden">
        <div class="md:flex">
          <div class="md:w-1/3 bg-cinema-surface p-6 flex items-center justify-center">
            <img
              th:if="${booking.posterUrl != null and !#strings.isEmpty(booking.posterUrl)}"
              th:src="${booking.posterUrl}"
              th:alt="${booking.title}"
              referrerpolicy="no-referrer"
              class="w-full max-w-[180px] rounded-xl object-cover aspect-[2/3]"
              onerror="this.onerror=null;this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27180%27 height=%27270%27%3E%3Crect fill=%27%231a1a2e%27 width=%27180%27 height=%27270%27/%3E%3C/svg%3E'"
            />
          </div>
          <div class="md:w-2/3 p-8">
            <span class="inline-block px-3 py-1 rounded-full bg-purple-600/20 text-purple-300 text-xs font-semibold mb-3" th:text="${booking.genreName}"></span>
            <h1 class="text-2xl font-bold text-white mb-4" th:text="${booking.title}"></h1>
            <p class="text-gray-400 text-sm mb-6 line-clamp-3" th:text="${booking.description}"></p>

            <dl class="space-y-3 text-sm">
              <div class="flex justify-between border-b border-white/5 pb-2">
                <dt class="text-gray-500">Thời lượng</dt>
                <dd class="text-white font-medium" th:text="${booking.durationMinutes} + ' phút'"></dd>
              </div>
              <div class="flex justify-between border-b border-white/5 pb-2">
                <dt class="text-gray-500">Suất chiếu</dt>
                <dd class="text-white font-medium" th:text="${#temporals.format(booking.startTime, 'dd/MM/yyyy HH:mm')}"></dd>
              </div>
              <div class="flex justify-between border-b border-white/5 pb-2">
                <dt class="text-gray-500">Phòng</dt>
                <dd class="text-white font-medium" th:text="${booking.roomName}"></dd>
              </div>
            </dl>

            <div class="mt-8 p-4 rounded-xl bg-amber-500/10 border border-amber-500/30 text-amber-200 text-sm">
              <i class="fas fa-info-circle mr-2"></i>
              Chọn ghế và thanh toán sẽ được bổ sung ở bước tiếp theo.
            </div>

            <button type="button" disabled class="mt-6 w-full py-3 rounded-lg bg-gray-700 text-gray-400 font-semibold cursor-not-allowed">
              Tiếp tục chọn ghế (sắp có)
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
</body>
</html>
